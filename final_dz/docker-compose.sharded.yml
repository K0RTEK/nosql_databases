version: '3.9'
services:
  configsvr:
    image: mongo:7.0
    container_name: configsvr
    command: ["mongod", "--configsvr", "--replSet", "cfgReplSet", "--port", "27019", "--bind_ip_all"]
    ports:
      - "27019:27019"

  shard1:
    image: mongo:7.0
    container_name: shard1
    command: ["mongod", "--shardsvr", "--replSet", "shard1ReplSet", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27018:27018"

  shard2:
    image: mongo:7.0
    container_name: shard2
    command: ["mongod", "--shardsvr", "--replSet", "shard2ReplSet", "--port", "27028", "--bind_ip_all"]
    ports:
      - "27028:27028"

  mongos:
    image: mongo:7.0
    container_name: mongos
    depends_on:
      - configsvr
      - shard1
      - shard2
    command: ["mongos", "--configdb", "cfgReplSet/configsvr:27019", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
