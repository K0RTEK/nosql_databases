version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: kirill
      MONGO_INITDB_ROOT_PASSWORD: 5567
      MONGO_INITDB_DATABASE: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - mongo-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  mongo-network:
    driver: bridge